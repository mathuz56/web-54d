<!DOCTYPE html>
<!-- 54D portal web demo · v0.10 · público-ready (proxy allowlist anti-SSRF + rate-limit login/reset + sin email prellenado) + logout revoca server-side -->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>54D · Entrenamiento</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<script src="/static/hls.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---- fuentes oficiales 54D (Shopify CDN, CORS-open) ---- */
  @font-face{font-family:'F37Judge';src:url('https://cdn.shopify.com/s/files/1/0297/4010/5812/files/F37Judge-MediumCondensedNew.woff2?v=1754669572') format('woff2');font-weight:500;font-display:swap;}
  @font-face{font-family:'TradeGothicCn';src:url('https://cdn.shopify.com/s/files/1/0297/4010/5812/files/TradeGothicLTStd-BdCn20.otf?v=1754990332') format('opentype');font-weight:700;font-display:swap;}
  :root { --gold:#FFD100; --bg:#000; --card:#1A1A1A; --ok:#7CFC9B; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:'Poppins','Inter',-apple-system,Segoe UI,Roboto,sans-serif; }
  body { background:var(--bg); color:#fff; }
  .wrap { max-width:1040px; margin:0 auto; padding:24px; }
  h1 { font-family:'F37Judge','Outfit',sans-serif; font-size:24px; font-weight:500; text-transform:uppercase; letter-spacing:.01em; }
  .muted { color:#888; font-size:13px; }

  /* ---- pantalla de acceso estilo selector.54d.com ---- */
  #login, #resetbox { max-width:360px; margin:0 auto; background:transparent; padding:28px; border-radius:0; }
  .authpage { min-height:100vh; background:#000; display:flex; align-items:center; justify-content:center; }
  /* el JS muestra #app (display:block) al entrar; ocultamos la página de acceso sin tocar el JS */
  body:has(#app[style*="display: block"]) .authpage,
  body:has(#app[style*="display:block"]) .authpage { display:none; }
  .authcover { display:none; }
  .authpanel { width:100%; max-width:420px; padding:24px; }
  .auth-logo { display:block; width:200px; max-width:60%; margin:0 auto 26px; }
  .auth-label { font-family:'TradeGothicCn','Inter',sans-serif; text-transform:uppercase; letter-spacing:.12em; color:#aaa; font-size:12px; text-align:center; margin:4px 0 18px; }
  #login .muted, #resetbox .muted { margin:4px 0 18px; }
  input { width:100%; padding:12px 14px; margin:7px 0; border:1px solid #ddd; border-radius:4px; background:#fff; color:#111; font-size:15px; }
  input::placeholder { color:#888; }
  .btn { width:100%; background:var(--gold); color:#000; border:none; padding:12px; border-radius:4px; font-family:'F37Judge','Outfit',sans-serif; font-size:16px; font-weight:500; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; margin-top:10px; }
  .btn:disabled { opacity:.5; cursor:default; }
  .link { color:#bbb; font-size:13px; cursor:pointer; display:inline-block; margin-top:14px; background:none; border:none; text-align:center; width:100%; }
  .link:hover { color:var(--gold); }
  .err { color:#ff6b6b; font-size:13px; margin-top:10px; min-height:16px; text-align:center; }
  .okmsg { color:var(--ok); font-size:13px; margin-top:10px; min-height:16px; text-align:center; }
  @media (min-width:880px){
    .authpage { justify-content:flex-start; }
    .authcover { display:block; flex:0 0 42%; max-width:520px; min-height:100vh; background-image:url('https://selector.54d.com/wp-content/uploads/2025/07/login-cover-909x1024.jpg'); background-size:cover; background-position:center; }
    .authpanel { flex:1; max-width:480px; }
  }

  #app { display:none; }
  .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .topleft { display:flex; align-items:center; gap:14px; }
  .hdr-logo { height:48px; width:auto; max-width:140px; display:block; }
  .logout { background:var(--card); color:#fff; border:none; padding:8px 14px; border-radius:20px; cursor:pointer; font-size:13px; }
  .topright { display:flex; gap:8px; align-items:center; }
  .langsel { background:var(--card); color:#fff; border:1px solid #2a2a2a; padding:8px 10px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:700; }
  .authlang { display:flex; justify-content:flex-end; margin-bottom:6px; }

  /* welcome hero */
  .welcome { background:linear-gradient(135deg,#1a1a1a,#0d0d0d); border:1px solid #262626; border-radius:18px; padding:22px 24px; margin-bottom:18px; }
  .welcome .wt { font-family:'F37Judge','Outfit',sans-serif; font-size:28px; font-weight:500; text-transform:uppercase; letter-spacing:.01em; }
  .welcome .ws { color:#aaa; font-size:14px; margin-top:6px; }
  .welcome .wt .g { color:var(--gold); }

  /* player (oculto hasta elegir) */
  #player { display:none; margin-bottom:8px; }
  video { width:100%; border-radius:16px; background:#000; aspect-ratio:16/9; margin-bottom:6px; }
  .nowwrap { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:6px; }
  .nowplaying { font-weight:800; color:var(--gold); font-size:16px; }
  .chips { margin-top:4px; }
  .chip { display:inline-block; background:#222; color:#bbb; font-size:11px; padding:3px 9px; border-radius:10px; margin:2px 4px 2px 0; }
  .donebtn { background:var(--gold); color:#000; border:1px solid var(--gold); padding:9px 14px; border-radius:20px; font-size:13px; font-weight:800; cursor:pointer; white-space:nowrap; }
  .donebtn.done { background:transparent; color:var(--gold); border:1px solid var(--gold); }
  .closebtn { background:#222; color:#aaa; border:none; width:34px;height:34px;border-radius:50%; cursor:pointer; font-size:16px; }
  .exlist { display:flex; gap:8px; overflow-x:auto; margin:8px 0 4px; }
  .exlist .ex { flex:0 0 auto; background:#222; border:none; color:#fff; padding:8px 12px; border-radius:18px; font-size:12px; cursor:pointer; }
  .exlist .ex.active { background:var(--gold); color:#000; font-weight:700; }
  /* controles del reproductor (v0.4) */
  .pbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin:8px 0 4px; }
  .pbar-grp { display:flex; gap:4px; align-items:center; }
  .pbtn { background:#222; color:#fff; border:none; padding:7px 11px; border-radius:16px; font-size:12px; font-weight:700; cursor:pointer; }
  .pbtn:hover { background:#333; }
  .pbtn.on { background:var(--gold); color:#000; }
  .speedchip { background:#222; color:#bbb; border:none; padding:6px 9px; border-radius:14px; font-size:11px; cursor:pointer; }
  .speedchip.active { background:var(--gold); color:#000; font-weight:800; }
  .qlabel { font-size:11px; color:#888; }
  .qsel { background:#222; color:#fff; border:1px solid #2a2a2a; padding:6px 8px; border-radius:14px; font-size:12px; cursor:pointer; }
  .loopchip { font-size:11px; color:var(--gold); white-space:nowrap; }
  .exwrap { display:flex; gap:8px; align-items:center; margin:8px 0 4px; }
  .exwrap .exlist { flex:1; margin:0; }
  .resttimer { display:none; position:fixed; inset:0; background:rgba(0,0,0,.78); z-index:50; align-items:center; justify-content:center; }
  .resttimer.show { display:flex; }
  .rt-box { background:var(--card); border-radius:20px; padding:28px 32px; text-align:center; min-width:280px; }
  .rt-time { font-size:64px; font-weight:900; color:var(--gold); font-variant-numeric:tabular-nums; line-height:1; }
  .rt-label { color:#888; font-size:13px; margin:6px 0 4px; }
  .rt-presets, .rt-actions { display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
  .rt-presets button, .rt-actions button { background:#222; color:#fff; border:none; padding:9px 13px; border-radius:16px; font-size:13px; font-weight:700; cursor:pointer; }
  .rt-presets button:hover, .rt-actions button:hover { background:#333; }
  .rt-actions button.primary { background:var(--gold); color:#000; }
  /* ---- reproductor OTT (v0.5) ---- */
  .vplayer { position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:16px; overflow:hidden; }
  .vplayer video { width:100%; height:100%; display:block; background:#000; object-fit:contain; }
  .vplayer.hidecursor { cursor:none; }
  .vplayer:fullscreen { aspect-ratio:auto; border-radius:0; }
  .vp-spinner { position:absolute; top:50%; left:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border:4px solid rgba(255,255,255,.25); border-top-color:var(--gold); border-radius:50%; animation:vpspin .8s linear infinite; display:none; z-index:3; }
  .vp-spinner.show { display:block; }
  @keyframes vpspin { to { transform:rotate(360deg); } }
  .vp-bigplay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:76px; height:76px; border-radius:50%; border:none; background:rgba(0,0,0,.45); cursor:pointer; z-index:4; display:flex; align-items:center; justify-content:center; transition:.15s; }
  .vp-bigplay:hover { background:var(--gold); transform:translate(-50%,-50%) scale(1.06); }
  .vp-bigplay svg { width:34px; height:34px; fill:#fff; margin-left:3px; }
  .vp-bigplay:hover svg { fill:#000; }
  .vp-bigplay.hidden { display:none; }
  .vp-gradient { position:absolute; left:0; right:0; bottom:0; height:130px; background:linear-gradient(transparent, rgba(0,0,0,.9)); pointer-events:none; z-index:2; opacity:0; transition:opacity .2s; }
  .vplayer.show-ui .vp-gradient { opacity:1; }
  .vp-controls { position:absolute; left:0; right:0; bottom:0; padding:0 14px 12px; z-index:5; opacity:0; transform:translateY(8px); transition:opacity .2s, transform .2s; pointer-events:none; }
  .vplayer.show-ui .vp-controls { opacity:1; transform:none; pointer-events:auto; }
  .vp-bar { position:relative; height:5px; background:rgba(255,255,255,.25); border-radius:3px; cursor:pointer; margin-bottom:8px; touch-action:none; }
  .vp-bar:hover { height:7px; }
  .vp-buffered { position:absolute; left:0; top:0; bottom:0; background:rgba(255,255,255,.35); border-radius:3px; width:0; }
  .vp-loopzone { position:absolute; top:0; bottom:0; background:rgba(255,209,0,.28); border-left:2px solid var(--gold); border-right:2px solid var(--gold); display:none; }
  .vp-progress { position:absolute; left:0; top:0; bottom:0; background:var(--gold); border-radius:3px; width:0; }
  .vp-knob { position:absolute; top:50%; width:13px; height:13px; margin:-6.5px 0 0 -6.5px; background:var(--gold); border-radius:50%; left:0; opacity:0; transition:opacity .15s; box-shadow:0 0 0 4px rgba(255,209,0,.22); }
  .vp-bar:hover .vp-knob { opacity:1; }
  .vp-row { display:flex; align-items:center; gap:4px; }
  .vp-ic { background:none; border:none; color:#fff; cursor:pointer; padding:6px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:12.5px; font-weight:700; line-height:1; }
  .vp-ic:hover { color:var(--gold); }
  .vp-ic.on { color:var(--gold); }
  .vp-ic svg { width:21px; height:21px; fill:currentColor; display:block; }
  .vp-txt { padding:6px 8px; white-space:nowrap; }
  .vp-time { font-size:12px; color:#e0e0e0; font-variant-numeric:tabular-nums; margin:0 4px; white-space:nowrap; }
  .vp-vol { display:flex; align-items:center; gap:2px; }
  .vp-volbar { width:64px; accent-color:var(--gold); cursor:pointer; }
  .vplayer .loopchip { color:var(--gold); font-size:11px; white-space:nowrap; align-self:center; }
  .vp-menu { position:absolute; right:14px; bottom:62px; background:rgba(18,18,18,.97); border:1px solid #2a2a2a; border-radius:12px; padding:6px; z-index:7; display:none; min-width:128px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
  .vp-menu.show { display:block; }
  .vp-menu h5 { color:#888; font-size:10px; padding:5px 12px 3px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; }
  .vp-menu .mi { display:block; width:100%; text-align:left; background:none; border:none; color:#ddd; padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; }
  .vp-menu .mi:hover { background:#2a2a2a; }
  .vp-menu .mi.active { color:var(--gold); font-weight:800; }

  .tabs { display:flex; gap:8px; margin:8px 0 6px; border-bottom:1px solid #222; }
  .tab { background:none; border:none; color:#888; padding:10px 14px; cursor:pointer; font-family:'TradeGothicCn','Inter',sans-serif; font-size:15px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; border-bottom:2px solid transparent; }
  .tab.active { color:#fff; border-bottom-color:var(--gold); }

  .daynav { display:flex; align-items:center; justify-content:space-between; background:var(--card); border-radius:14px; padding:12px 16px; margin-top:16px; }
  .daynav .arrow { background:#000; color:#fff; border:none; width:38px; height:38px; border-radius:50%; font-size:18px; cursor:pointer; }
  .daynav .arrow:hover { background:#333; }
  .daynav .ctr { text-align:center; }
  .daynav .date { font-family:'F37Judge','Outfit',sans-serif; font-size:18px; font-weight:500; text-transform:uppercase; letter-spacing:.01em; }
  .daynav .sub { font-size:12px; color:var(--gold); margin-top:2px; }
  .todaybtn { background:var(--gold); color:#000; border:none; padding:6px 12px; border-radius:16px; font-size:12px; font-weight:800; cursor:pointer; margin-left:8px; }
  .restday { text-align:center; padding:40px; color:#888; }
  .dayhint { color:#888; font-size:12px; margin:12px 0 2px; }

  .prog { margin-top:18px; }
  .prog h2 { font-family:'F37Judge','Outfit',sans-serif; font-size:18px; font-weight:500; text-transform:uppercase; letter-spacing:.01em; display:flex; align-items:center; gap:8px; }
  .pill { font-family:'TradeGothicCn','Inter',sans-serif; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; background:#222; color:var(--gold); text-transform:uppercase; letter-spacing:.05em; }
  .prog .muted { margin-bottom:8px; }
  .scrollwrap { position:relative; }
  .scroller { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; scroll-behavior:smooth; scrollbar-width:none; -ms-overflow-style:none; }
  .scroller::-webkit-scrollbar { display:none; }
  .scroller .card { flex:0 0 160px; }
  .scrollarrow { position:absolute; top:calc(50% - 4px); transform:translateY(-50%); z-index:6; width:36px; height:36px;
    border-radius:50%; border:none; background:rgba(0,0,0,.6); color:#fff; font-size:20px; line-height:1; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:.15s; box-shadow:0 2px 8px rgba(0,0,0,.5); }
  .scrollarrow:hover { background:var(--gold); color:#000; }
  .scrollarrow.left { left:2px; }
  .scrollarrow.right { right:2px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .cal-month { margin-top:20px; }
  .cal-month h3 { font-family:'F37Judge','Outfit',sans-serif; font-size:18px; font-weight:500; text-transform:uppercase; letter-spacing:.01em; margin-bottom:10px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal-head { text-align:center; font-size:11px; color:#888; font-weight:700; }
  .cal-cell { aspect-ratio:1; border-radius:8px; background:#0d0d0d; position:relative; overflow:hidden; }
  .cal-cell.empty { background:transparent; }
  .cal-cell .num { position:absolute; top:4px; left:6px; font-size:11px; color:#777; font-weight:700; z-index:2; }
  .cal-cell.today { outline:2px solid var(--gold); }
  .cal-cell.today .num { color:var(--gold); }
  .cal-cell.has { cursor:pointer; }
  .cal-cell.has:hover { filter:brightness(1.18); }
  .cal-cell.has img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.5; }
  .cal-cell .vtitle { position:absolute; bottom:3px; left:4px; right:4px; font-size:9px; line-height:1.12; z-index:2; font-weight:600; text-shadow:0 1px 3px #000; max-height:32px; overflow:hidden; }
  .cal-cell .ok { position:absolute; top:3px; right:4px; color:var(--ok); font-size:12px; z-index:3; text-shadow:0 1px 2px #000; }
  .cal-cell .cnt { position:absolute; bottom:3px; right:4px; background:var(--gold); color:#000; border-radius:7px; font-size:8.5px; font-weight:800; padding:0 5px; z-index:3; }

  .card { background:var(--card); border-radius:12px; overflow:hidden; cursor:pointer; transition:.15s; position:relative; }
  .card:hover { transform:translateY(-2px); background:#222; }
  .card.active { outline:2px solid var(--gold); }
  .thumb { width:100%; aspect-ratio:16/9; object-fit:cover; background:linear-gradient(135deg,#1a1a1a,#0a0a0a); display:block; }
  .card .badge { position:absolute; top:6px; left:6px; background:rgba(0,0,0,.6); color:var(--gold); font-family:'TradeGothicCn','Inter',sans-serif; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 6px; border-radius:6px; }
  .card .ok { position:absolute; top:6px; right:6px; color:var(--ok); font-size:14px; text-shadow:0 1px 3px #000; }
  .card .meta { padding:8px 10px; }
  .card .t { font-size:12.5px; font-weight:600; line-height:1.25; }
  .card .wd { font-size:10.5px; color:var(--gold); margin-top:3px; }
  .loading { text-align:center; color:#888; padding:40px; }
</style>
</head>
<body>

<!-- AUTH (login + reset) estilo selector.54d.com -->
<div class="authpage" id="authpage">
  <div class="authcover"></div>
  <div class="authpanel">

    <div class="authlang">
      <select id="langLogin" class="langsel" onchange="setLang(this.value)">
        <option value="es">ES</option><option value="en">EN</option><option value="pt">PT</option>
      </select>
    </div>

    <!-- LOGIN -->
    <div id="login">
      <img class="auth-logo" src="https://selector.54d.com/wp-content/uploads/2025/07/logo-on.svg" alt="54D ON">
      <p class="auth-label" id="loginLabel">Member access</p>
      <input id="email" type="email" placeholder="Email" autocomplete="username">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
      <button class="btn" id="loginBtn" onclick="doLogin()">Log in</button>
      <div class="err" id="err"></div>
      <button class="link" id="forgotLink" onclick="showReset()">Forgot your password?</button>
    </div>

    <!-- RESET -->
    <div id="resetbox" style="display:none">
      <img class="auth-logo" src="https://selector.54d.com/wp-content/uploads/2025/07/logo-on.svg" alt="54D ON">
      <p class="auth-label" id="resetLabel">Set password</p>
      <p class="muted" id="resetDesc" style="text-align:center">We sent you an email to create/reset your 54D password.</p>
      <input id="resetEmail" type="email" placeholder="Your email" autocomplete="username">
      <button class="btn" id="resetBtn" onclick="doReset()">Send email</button>
      <div class="okmsg" id="resetMsg"></div>
      <button class="link" id="resetBack" onclick="showLogin()">← Back to login</button>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app"><div class="wrap">
  <div class="top">
    <div class="topleft">
      <img class="hdr-logo" src="https://selector.54d.com/wp-content/uploads/2025/07/logo-on.svg" alt="54D ON">
      <div><h1 id="hello">Hola</h1><p class="muted" id="count"></p></div>
    </div>
    <div class="topright">
      <select id="lang" class="langsel" onchange="setLang(this.value)">
        <option value="es">ES</option><option value="en">EN</option><option value="pt">PT</option>
      </select>
      <button class="logout" id="logoutBtn" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="welcome" id="welcome">
    <div class="wt"><span id="wpre">¡Hola,</span> <span class="g" id="wname">!</span></div>
    <div class="ws" id="wsub">Elige tu entrenamiento para empezar.</div>
  </div>

  <div id="player">
    <div class="vplayer" id="vplayer">
      <video id="v" playsinline preload="metadata"></video>
      <div class="vp-spinner" id="vpSpinner"></div>
      <button class="vp-bigplay" id="vpBig" onclick="togglePlay()" aria-label="Reproducir">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="vp-gradient"></div>
      <div class="vp-controls" id="vpControls">
        <div class="vp-bar" id="vpBar">
          <div class="vp-buffered" id="vpBuffered"></div>
          <div class="vp-loopzone" id="vpLoopZone"></div>
          <div class="vp-progress" id="vpProgress"></div>
          <div class="vp-knob" id="vpKnob"></div>
        </div>
        <div class="vp-row">
          <button class="vp-ic" id="vpPlay" onclick="togglePlay()" aria-label="Play/Pausa">
            <svg id="icPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icPause" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
          </button>
          <button class="vp-ic vp-txt" onclick="seekBy(-10)" title="-10s">« 10</button>
          <button class="vp-ic vp-txt" onclick="seekBy(10)" title="+10s">10 »</button>
          <div class="vp-vol">
            <button class="vp-ic" id="vpMute" onclick="toggleMute()" aria-label="Silenciar">
              <svg id="icVol" viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3zm11 .5c1 .6 1.6 1.8 1.6 3s-.6 2.4-1.6 3v-6z"/></svg>
              <svg id="icMute" viewBox="0 0 24 24" style="display:none"><path d="M3 10v4h4l5 5V5L7 10H3zm15.5 2 2-2-1-1-2 2-2-2-1 1 2 2-2 2 1 1 2-2 2 2 1-1-2-2z"/></svg>
            </button>

function isoToDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function dateToISO(dt){ return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }

async function apiFetch(url, opts={}){
  // Sesion por cookie HttpOnly; el refresh del idToken lo hace el server.
  opts.credentials = 'same-origin';
  return await fetch(url, opts);
}

async function doLogin(){
  $('err').textContent=""; $('loginBtn').disabled=true; $('loginBtn').textContent=t('validating');
  try{
    const r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:$('email').value.trim(),password:$('password').value})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||t('loginFail'));
    enterApp();
  }catch(e){ $('err').textContent=e.message; }
  finally{ $('loginBtn').disabled=false; $('loginBtn').textContent=t('loginBtn'); }
}

  setTxt('loginLabel','loginLabel'); setTxt('loginBtn','loginBtn'); setTxt('forgotLink','forgot');
  setTxt('resetLabel','resetLabel'); setTxt('resetDesc','resetDesc'); setTxt('resetBtn','resetBtn'); setTxt('resetBack','resetBack');
  const setPh=(id,k)=>{ const el=$(id); if(el) el.placeholder=t(k); };
  setPh('email','emailPh'); setPh('password','passPh'); setPh('resetEmail','resetEmailPh');
  $('logoutBtn').textContent=t('logout');

function setLang(l){

    updateCount(); updateWelcomeSub(); renderHoy(); renderPrograms(); renderCalendar(); }

function enterApp(){ $('login').style.display="none"; $('resetbox').style.display="none"; $('app').style.display="block";
  $('lang').value=LANG; document.documentElement.lang=LANG; applyStaticLabels(); startRefreshTimer(); loadContent(); }

async function loadContent(){
  try{
    const r=await apiFetch("/api/content"); const d=await r.json();
    if(!r.ok) throw new Error(d.error||"error");
    DATA=d; FLAT=[];
    DONE = new Set(JSON.parse(localStorage.getItem('done54')||'[]'));
    $('hello').textContent=t('hello')+", "+(d.name||t('member'));
    $('wname').textContent=(d.name||t('member')).split(' ')[0]+"!";
    updateCount();
    buildDateMap(); updateWelcomeSub(); renderHoy(); renderPrograms(); renderCalendar();
  }catch(e){ $('view-hoy').innerHTML='<div class="loading">'+e.message+'</div>'; }
}
function updateCount(){ const tot=(DATA.programs||[]).reduce((a,p)=>a+p.videos.length,0);
  $('count').textContent=(DATA.programs||[]).length+" "+t('programs')+" · "+tot+" "+t('videos')+" · "+DONE.size+" "+t('completed'); }
function updateWelcomeSub(){
  const iso=dateToISO(TODAY), vids=DATEMAP[iso]||[];
  $('wsub').innerHTML = vids.length ? `${t('todayWorkout')} <b>${vids.map(v=>esc(v.title)).join(' · ')}</b> ${t('chooseBelow')}`
                                    : t('restToday');
}

function buildDateMap(){
  DATEMAP={}; START = DATA.startDate? isoToDate(DATA.startDate): null;
  TODAY=new Date(); SEL=new Date(TODAY);
  if(!START) return;
  (DATA.calendar||[]).forEach(wk=>{
    const wn=parseInt(wk.week.replace('w',''));
    wk.days.forEach(dy=>{
      const dn=parseInt(dy.day.replace('d',''));
      const iso=dateToISO(addDays(START,(wn-1)*7+(dn-1)));
      DATEMAP[iso]=(DATEMAP[iso]||[]).concat(dy.videos);
    });
  });
}

function thumbImg(vd, lazy){
  const t=vd.thumb?proxied(vd.thumb):"";
  return t?`<img class="thumb" loading="${lazy?'lazy':'eager'}" src="${t}" onerror="this.removeAttribute('src')">`:`<div class="thumb"></div>`;
}
function card(vd, lazy){
  const i=FLAT.length; FLAT.push(vd);
  const prog = vd._prog?`<span class="badge">${esc(vd._prog)}</span>`:'';
  return `<div class="card" data-i="${i}" onclick="play(${i})">${thumbImg(vd,lazy)}${prog}${DONE.has(vd.id)?'<span class="ok">✓</span>':''}
    <div class="meta"><div class="t">${esc(vd.title)}</div><div class="wd">${(vd.week||'').toUpperCase()} · ${(vd.day||'').toUpperCase()}</div></div></div>`;
}

// ---------- HOY / día seleccionado ----------
function renderHoy(){
  const v=$('view-hoy');
  if(!START){ v.innerHTML='<div class="restday">'+t('noStart')+'</div>'; return; }
  const iso=dateToISO(SEL), dt=SEL, isToday= iso===dateToISO(TODAY);
  const label=`${DOW[dt.getDay()]}, ${dt.getDate()} ${String(MONFULL[dt.getMonth()]).slice(0,3)}`;
  const vids=DATEMAP[iso]||[];
  let body = vids.length
    ? `<div class="dayhint">${vids.length>1?t('youHave')+' '+vids.length+' '+t('workoutsThisDay')+' — '+t('chooseWhich')+':':t('tapToSee')}</div><div class="grid">${vids.map(v=>card(v,false)).join('')}</div>`
    : `<div class="restday">${t('restDay')}</div>`;
  v.innerHTML=`<div class="daynav">
      <button class="arrow" onclick="moveDay(-1)">‹</button>
      <div class="ctr"><div class="date">${label}${isToday?' · '+t('today'):''}</div>
        <div class="sub">${vids.length} ${vids.length===1?t('video1'):t('videos')}${isToday?'':' <button class=todaybtn onclick=goToday()>'+t('today')+'</button>'}</div></div>
      <button class="arrow" onclick="moveDay(1)">›</button></div>${body}`;
}
function moveDay(n){ SEL=addDays(SEL,n); renderHoy(); }
function goToday(){ SEL=new Date(TODAY); renderHoy(); }
function openDay(iso){ SEL=isoToDate(iso); showTab('hoy'); renderHoy(); $('view-hoy').scrollIntoView({behavior:'smooth',block:'start'}); }

function renderPrograms(){
  const v=$('view-prog');
  if(!DATA.programs||!DATA.programs.length){ v.innerHTML='<div class="loading">'+t('noPrograms')+'</div>'; return; }
  v.innerHTML=DATA.programs.map(p=>{
    const slot=p.slot==='primary'||p.slot==='a'?t('principal'):t('secundario');
    return `<div class="prog"><h2>${esc(p.title)} <span class="pill">${slot}</span></h2>
      <div class="muted">${p.count} ${t('videos')}</div>
      <div class="scrollwrap">
        <button class="scrollarrow left" onclick="scrollRow(this,-1)">‹</button>
        <div class="scroller">${p.videos.map(v=>card(v,true)).join('')}</div>
        <button class="scrollarrow right" onclick="scrollRow(this,1)">›</button>
      </div></div>`;
  }).join('');
  updateProgArrows();
}
// desplaza la fila de tarjetas con las flechas; oculta flechas si no hay overflow
function scrollRow(btn, dir){
  const sc = btn.closest('.scrollwrap')?.querySelector('.scroller');
  if(sc) sc.scrollBy({ left: dir * Math.max(sc.clientWidth*0.8, 200), behavior:'smooth' });
}
function updateProgArrows(){
  document.querySelectorAll('#view-prog .scrollwrap').forEach(w=>{
    const sc=w.querySelector('.scroller');
    const over = sc && sc.scrollWidth > sc.clientWidth + 4;
    w.querySelectorAll('.scrollarrow').forEach(a=>a.style.display = over ? 'flex' : 'none');
  });
}

function renderCalendar(){
  const v=$('view-cal');
  const isos=Object.keys(DATEMAP).sort();
  if(!START||!isos.length){ v.innerHTML='<div class="loading">'+t('noCal')+'</div>'; return; }
  const first=isoToDate(isos[0]), last=isoToDate(isos[isos.length-1]);
  let html=''; let cur=new Date(first.getFullYear(),first.getMonth(),1);
  const end=new Date(last.getFullYear(),last.getMonth(),1);
  while(cur<=end){ html+=renderMonth(cur.getFullYear(),cur.getMonth()); cur=new Date(cur.getFullYear(),cur.getMonth()+1,1); }
  v.innerHTML=html;
}
function renderMonth(y,m){
  const startIdx=(new Date(y,m,1).getDay()+6)%7, dim=new Date(y,m+1,0).getDate();
  let cells=(WDL[LANG]||WDL.es).map(w=>`<div class="cal-head">${w}</div>`).join('');
  for(let i=0;i<startIdx;i++) cells+='<div class="cal-cell empty"></div>';
  for(let dn=1;dn<=dim;dn++){
    const iso=dateToISO(new Date(y,m,dn)), vids=DATEMAP[iso]||[], today=iso===dateToISO(TODAY)?' today':'';
    if(vids.length){
      const vd=vids[0];
      const t=vd.thumb?proxied(vd.thumb):'';
      const allDone = vids.every(x=>DONE.has(x.id));
      cells+=`<div class="cal-cell has${today}" onclick="openDay('${iso}')">
        ${t?`<img loading="lazy" src="${t}" onerror="this.remove()">`:''}
        <span class="num">${dn}</span>${allDone?'<span class="ok">✓</span>':''}
        ${vids.length>1?`<span class="cnt">+${vids.length-1}</span>`:''}
        <span class="vtitle">${esc(vd.title)}</span></div>`;
    } else cells+=`<div class="cal-cell${today}"><span class="num">${dn}</span></div>`;
  }
  return `<div class="cal-month"><h3>${MONFULL[m]} ${y}</h3><div class="cal-grid">${cells}</div></div>`;
}

function showTab(tab){ ['hoy','prog','cal'].forEach(x=>{ $('tab-'+x).classList.toggle('active',x===tab); $('view-'+x).style.display=x===tab?'block':'none'; }); if(tab==='prog') updateProgArrows(); }

function closeMenus(){ $('menuSpeed').classList.remove('show'); $('menuSettings').classList.remove('show'); }

// velocidad
function buildSpeedMenu(){ $('menuSpeed').innerHTML='<h5>'+t('speed')+'</h5>'+SPEEDS.map(r=>`<button class="mi${r===SPEED?' active':''}" onclick="setSpeed(${r});closeMenus()">${r}×</button>`).join(''); }
function setSpeed(r){ SPEED=r; try{localStorage.setItem('speed54',String(r));}catch(e){} const v=$('v'); if(v) v.playbackRate=r; $('vpSpeedBtn').textContent=r+'×'; buildSpeedMenu(); }
function seekBy(n){ const v=$('v'); if(!v) return; const d=isFinite(v.duration)?v.duration:1e9; v.currentTime=Math.max(0,Math.min(d, v.currentTime+n)); showUI(); }

// loop A-B
function cycleLoop(){ const v=$('v');
  if(LOOPA===null){ LOOPA=v.currentTime; }
  else if(LOOPB===null){ LOOPB=v.currentTime; if(LOOPB<LOOPA){ const x=LOOPA; LOOPA=LOOPB; LOOPB=x; } if(LOOPB-LOOPA<0.5){ LOOPA=LOOPB=null; } }
  else { LOOPA=LOOPB=null; }
  updateLoopUI(); }
function clearLoop(){ LOOPA=LOOPB=null; updateLoopUI(); }
function updateLoopUI(){ const b=$('vpLoopBtn'), info=$('loopInfo');
  if(b){ b.classList.toggle('on', LOOPA!==null); b.style.color = LOOPA!==null?'':'#fff'; }
  if(info) info.textContent = LOOPA===null ? '' : (LOOPB===null ? 'A '+fmtT(LOOPA)+'…' : 'A '+fmtT(LOOPA)+' · B '+fmtT(LOOPB));
  const z=$('vpLoopZone'), v=$('v'), d=isFinite(v.duration)?v.duration:0;
  if(z){ if(LOOPA!==null && d){ z.style.display='block'; z.style.left=(LOOPA/d*100)+'%'; z.style.width=((((LOOPB!==null?LOOPB:LOOPA))-LOOPA)/d*100)+'%'; } else z.style.display='none'; } }

// calidad (en el menú ⚙)
function populateQuality(bestIdx){ const m=$('menuSettings'); if(!m){return;} if(!HLS||!HLS.levels){ m.innerHTML=''; return; }
  const lv=HLS.levels.map((l,i)=>({i,h:l.height||0})).sort((a,b)=>b.h-a.h);
  m.innerHTML='<h5>'+t('quality')+'</h5>'
    +`<button class="mi" data-q="auto" onclick="setQuality('auto')">Auto</button>`
    +lv.map(x=>`<button class="mi${x.i===bestIdx?' active':''}" data-q="${x.i}" onclick="setQuality('${x.i}')">${x.h}p</button>`).join(''); }
function setQuality(val){ if(!HLS) return; HLS.currentLevel = val==='auto' ? -1 : parseInt(val,10);
  $('menuSettings').querySelectorAll('.mi').forEach(b=>b.classList.toggle('active', b.dataset.q===String(val))); closeMenus(); }

// timer de descanso
let RESTINT=null, restLeft=0, restPaused=false;
function openRest(){ closeMenus(); $('restTimer').classList.add('show'); renderRest(); }
function closeRest(){ if(RESTINT){clearInterval(RESTINT);RESTINT=null;} $('restTimer').classList.remove('show'); }
function startRest(sec){ restLeft=sec; restPaused=false; $('rtPause').textContent=t('restPause');
  if(RESTINT) clearInterval(RESTINT);
  RESTINT=setInterval(()=>{ if(restPaused) return; restLeft--; renderRest(); if(restLeft<=0){ clearInterval(RESTINT); RESTINT=null; beep(); } },1000);
  renderRest(); }
function rtAdjust(n){ restLeft=Math.max(0,restLeft+n); renderRest(); }
function toggleRestPause(){ restPaused=!restPaused; $('rtPause').textContent= restPaused?t('restResume'):t('restPause'); }
function renderRest(){ $('rtTime').textContent=fmtT(restLeft); }
function beep(){ try{ const ac=new (window.AudioContext||window.webkitAudioContext)(); const o=ac.createOscillator(), g=ac.createGain();
  o.connect(g); g.connect(ac.destination); o.type='sine'; o.frequency.value=880; g.gain.value=0.2; o.start(); setTimeout(()=>{o.stop();ac.close();},400);
}catch(e){} }

// barra de progreso + seek + auto-hide + spinner
function vpUpdateBar(){ const v=$('v'); const d=isFinite(v.duration)?v.duration:0; const pct=d?(v.currentTime/d*100):0;
  $('vpProgress').style.width=pct+'%'; $('vpKnob').style.left=pct+'%';
  if(v.buffered.length&&d) $('vpBuffered').style.width=(v.buffered.end(v.buffered.length-1)/d*100)+'%';
  $('vpTime').textContent=fmtT(v.currentTime)+' / '+fmtT(d); }
function vpSeekTo(clientX){ const v=$('v'); const r=$('vpBar').getBoundingClientRect(); const x=Math.min(1,Math.max(0,(clientX-r.left)/r.width)); if(isFinite(v.duration)) v.currentTime=x*v.duration; }
function showUI(){ const p=vp(); if(!p) return; p.classList.add('show-ui'); p.classList.remove('hidecursor'); clearTimeout(UIHIDE);
  UIHIDE=setTimeout(()=>{ const v=$('v'); if(v&&!v.paused && !$('menuSpeed').classList.contains('show') && !$('menuSettings').classList.contains('show')){ p.classList.remove('show-ui'); p.classList.add('hidecursor'); closeMenus(); } }, 2800); }
function vpSpin(on){ $('vpSpinner').classList.toggle('show', on); }

// ejercicios como capítulos
function exNav(dir){ if(CUR_I===null) return; const vd=FLAT[CUR_I]; if(!vd||!vd.exercises||vd.exercises.length<2) return;
  CUR_J=Math.max(0,Math.min(vd.exercises.length-1, CUR_J+dir)); playEx(CUR_I,CUR_J); }

function play(i){
  const vd=FLAT[i]; if(!vd) return; CURRENT=vd; CUR_I=i; CUR_J=0; clearLoop();
  $('welcome').style.display='none';
  $('player').style.display='block';
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.card[data-i="'+i+'"]').forEach(c=>c.classList.add('active'));
  $('nowplaying').textContent=vd.title;
  const d=vd.detail||{}; const chips=[];
  // oculta valores que son IDs crudos (UUID / strings largos sin espacios), no etiquetas legibles
  const isId=s=>/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-/i.test(s)||/^[A-Za-z0-9_-]{20,}$/.test(s);
  const clean=arr=>(Array.isArray(arr)?arr:[]).map(x=>String(x)).filter(x=>x&&!isId(x));
  if(d.duration) chips.push(d.duration>=120?Math.round(d.duration/60)+' min':d.duration+' s');
  const ta=clean(d.target_area); if(ta.length) chips.push(ta.join(', '));
  const eq=clean(d.equipments); if(eq.length) chips.push(eq.join(', '));
  if(d.intensity && !isId(String(d.intensity))) chips.push(d.intensity);
  $('chips').innerHTML=chips.map(c=>`<span class="chip">${c}</span>`).join('');
  const db=$('doneBtn'); db.classList.toggle('done',DONE.has(vd.id));
  db.textContent=DONE.has(vd.id)?t('done'):t('markDone');
  const multi = vd.exercises && vd.exercises.length>1;
  $('exwrap').style.display = multi?'flex':'none';
  $('exlist').innerHTML = multi
    ? vd.exercises.map((ex,j)=>`<button class="ex${j===0?' active':''}" onclick="playEx(${i},${j})">${j+1}. ${esc(ex.title)}</button>`).join('') : '';
  setSpeed(SPEED); buildSpeedMenu(); $('menuSettings').innerHTML='';
  vp().classList.add('show-ui');
  loadVideo(vd.url);
  $('player').scrollIntoView({behavior:'smooth',block:'start'});
}
function playEx(i,j){
  const vd=FLAT[i], ex=vd.exercises[j]; CUR_I=i; CUR_J=j; clearLoop();
  document.querySelectorAll('#exlist .ex').forEach((b,k)=>b.classList.toggle('active',k===j));
  $('nowplaying').textContent=vd.title+" — "+ex.title;
  loadVideo(ex.url);
}
function loadVideo(url){
  const v=$('v'); const purl="/api/playlist?vid="+encodeURIComponent(url); CURURL=url;
  if(HLS){HLS.destroy();HLS=null;}
  closeMenus(); vpSpin(true);
  $('vpProgress').style.width='0'; $('vpBuffered').style.width='0'; $('vpKnob').style.left='0'; $('vpLoopZone').style.display='none';
  $('vpTime').textContent='0:00 / 0:00';
  // PREFERIR hls.js cuando está soportado (Chrome/Android) → control de calidad;
  // HLS nativo solo en Safari/iOS (Chrome devuelve canPlayType='maybe').
  if(window.Hls&&Hls.isSupported()){
    $('vpGear').style.display='flex';
    HLS=new Hls({ capLevelToPlayerSize:false, startLevel:-1 });
    HLS.loadSource(purl); HLS.attachMedia(v);
    HLS.on(Hls.Events.MANIFEST_PARSED, ()=>{
      if(HLS && HLS.levels && HLS.levels.length){
        let best=0; for(let k=1;k<HLS.levels.length;k++){ if((HLS.levels[k].height||0) > (HLS.levels[best].height||0)) best=k; }
        HLS.currentLevel = best;          // default = máxima
        populateQuality(best);
      }
      v.playbackRate=SPEED;
    });
  } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    $('vpGear').style.display='none';
    v.src=purl; v.load(); v.playbackRate=SPEED;
  }
}
function closePlayer(){ const v=$('v'); v.pause(); if(HLS){HLS.destroy();HLS=null;} v.removeAttribute('src'); v.load();
  closeRest(); clearLoop(); closeMenus(); CUR_I=null;
  $('player').style.display='none'; $('welcome').style.display='block'; CURRENT=null;
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); }

// bind de eventos del reproductor (una vez)
function bindPlayer(){ const v=$('v'), p=vp(); if(!v||!p) return;
  v.addEventListener('timeupdate', ()=>{ vpUpdateBar();
    if(v.currentTime>3 && CURURL) localStorage.setItem('pos:'+CURURL, v.currentTime);
    if(LOOPA!==null && LOOPB!==null && v.currentTime>=LOOPB) v.currentTime=LOOPA; });
  v.addEventListener('loadedmetadata', ()=>{ v.playbackRate=SPEED; vpUpdateBar(); updateLoopUI();
    const pp=parseFloat(localStorage.getItem('pos:'+CURURL)||'0'); if(pp>5 && pp<v.duration-10) v.currentTime=pp; });
  v.addEventListener('play', ()=>{ updatePlayIcon(); showUI(); });
  v.addEventListener('pause', ()=>{ updatePlayIcon(); p.classList.add('show-ui'); p.classList.remove('hidecursor'); clearTimeout(UIHIDE); });
  v.addEventListener('progress', vpUpdateBar);
  v.addEventListener('waiting', ()=>vpSpin(true));
  v.addEventListener('playing', ()=>{ vpSpin(false); updatePlayIcon(); });
  v.addEventListener('canplay', ()=>vpSpin(false));
  v.addEventListener('volumechange', updateVolIcon);
  v.addEventListener('click', togglePlay);
  v.addEventListener('dblclick', toggleFs);
  p.addEventListener('mousemove', showUI);
  p.addEventListener('mouseleave', ()=>{ if(!v.paused){ p.classList.remove('show-ui'); } });
  const bar=$('vpBar');
  bar.addEventListener('pointerdown', e=>{ DRAG=true; vpSeekTo(e.clientX); try{bar.setPointerCapture(e.pointerId);}catch(_){} });
  bar.addEventListener('pointermove', e=>{ if(DRAG) vpSeekTo(e.clientX); });
  window.addEventListener('pointerup', ()=>{ DRAG=false; });
  document.addEventListener('click', e=>{ if(!e.target.closest('.vp-menu') && !e.target.closest('#vpSpeedBtn') && !e.target.closest('#vpGear')) closeMenus(); });
  updateVolIcon();
}

// atajos de teclado (solo con player abierto; ignora inputs)
document.addEventListener('keydown', (e)=>{
  if($('player').style.display!=='block') return;
  const tag=(e.target.tagName||'').toUpperCase();
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA') return;
  const v=$('v'); if(!v) return;
  switch(e.key){
    case ' ': case 'k': e.preventDefault(); togglePlay(); break;
    case 'ArrowRight': e.preventDefault(); seekBy(10); break;
    case 'ArrowLeft': e.preventDefault(); seekBy(-10); break;
    case 'ArrowUp': e.preventDefault(); v.volume=Math.min(1,v.volume+0.1); break;
    case 'ArrowDown': e.preventDefault(); v.volume=Math.max(0,v.volume-0.1); break;
    case 'f': case 'F': toggleFs(); break;
    case 'm': case 'M': toggleMute(); break;
    case 'l': case 'L': cycleLoop(); break;
    case '[': exNav(-1); break;
    case ']': exNav(1); break;
  }
  showUI();
});
bindPlayer();

// ---------- marcar completado (write-back FitBudd, dry-run) ----------
function toggleDone(){
  // mark-complete DESHABILITADO en v1 (no write-back). Solo marca local.
  if(!CURRENT) return; const id=CURRENT.id; const db=$('doneBtn');
  const wasDone=DONE.has(id);
  if(wasDone) DONE.delete(id); else DONE.add(id);
  try{ localStorage.setItem('done54', JSON.stringify([...DONE])); }catch(e){}
  db.classList.toggle('done',!wasDone); db.textContent=!wasDone?t('done'):t('markDone');
  renderHoy(); renderPrograms(); renderCalendar(); updateCount();
}

let REFRESH_TIMER=null;
function logout(){
  // Cierre de sesion: revoca server-side (cookie HttpOnly) + limpia este dispositivo.
  fetch('/api/logout',{method:'POST',credentials:'same-origin'}).catch(()=>{});
  try{ localStorage.removeItem('done54');
    Object.keys(localStorage).filter(k=>k.indexOf('pos:')===0).forEach(k=>localStorage.removeItem(k)); }catch(e){}
  if(REFRESH_TIMER){ clearInterval(REFRESH_TIMER); REFRESH_TIMER=null; }
  session=null; DATA=null; FLAT=[]; DONE=new Set();
  if(HLS){HLS.destroy();HLS=null;}
  const v=$('v'); if(v){ try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(e){} }
  $('app').style.display="none"; $('resetbox').style.display="none"; $('login').style.display="block";
  $('email').value=""; $('password').value="";
  $('player').style.display='none'; $('welcome').style.display='block';
}

function startRefreshTimer(){ /* refresh del idToken lo maneja el server en /api/content */ }
window.addEventListener('load', ()=>{ document.documentElement.lang=LANG; applyStaticLabels();
  fetch('/api/session',{credentials:'same-origin'}).then(r=>r.json()).then(d=>{ if(d&&d.authenticated) enterApp(); }).catch(()=>{}); });
</script>
